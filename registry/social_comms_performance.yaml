# Dashboard Registry — Social Comms Performance
# Generated by /onboard-dashboard skill on 2026-07-06
# REVIEW ALL FIELDS MARKED WITH # VERIFY before committing.

dashboard: social_comms_performance
description: >
  Weekly view of Adobe's paid, organic, earned, and influencer social media
  performance across platforms, GTM segments, and cloud budgets. Used by the
  Social Comms / Growth Marketing & Insights team (owners: Sam Atayan,
  Yamini Pancheti; data stewards: Raghuram Gopalakrishnan, Nagaraju Gajula).

dashboard_table: socialmedia.social_hub_consolidated_dashboard  # VERIFY: confirm this is the exact BI-facing table
source_table:    socialmedia.social_media_consolidated_silver
date_column:     fiscal_yr_and_wk_desc
date_format:     "YYYY-WW"
lookback_weeks:  6

# No row exclusion was confirmed for this dashboard (no Budget/Test/Draft
# rows called out). NOTE: quality_checks.py unconditionally applies a
# hardcoded _NON_BUDGET filter — "(data_type != 'Budget' OR data_type IS
# NULL)" — to every query regardless of this YAML. # VERIFY that
# socialmedia.social_media_consolidated_silver has a `data_type` column (or
# the engine's SQL will error); if it doesn't, quality_checks.py needs a
# code change, not a YAML change.

metrics:

  - name: spend                    # VERIFY: confirm exact column name in source table
    tolerance_pct: 0.5              # currency — should reconcile almost exactly
    checks: [reconciliation, trend_sanity]

  - name: impressions              # VERIFY: confirm exact column name in source table
    tolerance_pct: 1.0              # large count
    checks: [reconciliation, trend_sanity]

  - name: interactions             # VERIFY: confirm exact column name in source table
    tolerance_pct: 1.0              # large count — the dashboard's primary KPI
    checks: [reconciliation, trend_sanity]

  - name: engagements              # VERIFY: confirm exact column name in source table
    tolerance_pct: 1.5              # engagement metric
    checks: [reconciliation, trend_sanity]

  - name: video_views              # VERIFY: confirm exact column name in source table
    tolerance_pct: 2.0              # volatile — swings with any single viral post
    checks: [reconciliation, trend_sanity]

  - name: clicks_all                # confirmed exact column name via Databricks UNRESOLVED_COLUMN suggestion (not "clicks"); distinct from link_clicks below
    tolerance_pct: 1.5
    checks: [reconciliation, trend_sanity]

  - name: link_clicks              # confirmed exact column name via Databricks UNRESOLVED_COLUMN suggestion; distinct from clicks_all above
    tolerance_pct: 1.5
    checks: [reconciliation, trend_sanity]

  - name: comments                 # VERIFY: confirm exact column name in source table
    tolerance_pct: 1.5
    checks: [reconciliation, trend_sanity]

  - name: likes                    # confirmed exact column name via Databricks UNRESOLVED_COLUMN suggestion
    tolerance_pct: 1.5
    checks: [reconciliation, trend_sanity]

  - name: shares                   # VERIFY: confirm exact column name in source table
    tolerance_pct: 1.5
    checks: [reconciliation, trend_sanity]

  - name: saves                    # confirmed exact column name via Databricks UNRESOLVED_COLUMN suggestion
    tolerance_pct: 1.5
    checks: [reconciliation, trend_sanity]

# ── Derived / aiding columns (informational only — not reconciled directly) ──
derived_metrics:
  - name: eir
    formula: "engagements / interactions"
    note: "Engagement Interaction Rate — calculated ratio, not reconciled directly"
  - name: cpm
    formula: "spend / impressions * 1000"
    note: "cost per 1,000 impressions — calculated ratio, not reconciled directly"
  - name: cpi
    formula: "spend / interactions"
    note: "cost per interaction — calculated ratio, not reconciled directly"
  - name: cpe
    formula: "spend / engagements"
    note: "cost per engagement — calculated ratio, not reconciled directly"
  - name: dollar_per_100_interactions
    formula: "spend / interactions * 100"
    note: "shown on dashboard as \"$/100I\" — calculated ratio, not reconciled directly"

dimensions:

  - name: media_type
    completeness_check: false   # VERIFY: multiple concurrent source migrations on this dimension —
      # (1) "Influencer (organic only)" has gone to zero posts from week 2026-24 onward;
      # (2) "Influencer (organic + boosting)" moved from Golin XLS to CreatorIQ API at week 2026-24 (only ~6 weeks of history as of 2026-30);
      # (3) Golin -> Wavemakers agency handoff for all Paid subtypes completed at week 2026-06;
      # (4) Organic moved from "Organic XLS" to Sprinklr API starting 2026 (backfilled).
      # Re-enable completeness_check once these migrations have settled and the value list is reconfirmed.
    expected_values:
      - Earned
      - Organic
      - Influencer (organic + boosting)
      - Influencer (organic only)   # VERIFY: zero posts since week 2026-24 — confirm whether to drop this value entirely
      - Paid - Boosted Owned
      - Paid - Boosted Whitelisted
      - Paid - Dark Owned
      - Paid - Dark Whitelisted
      - Paid (fallback)             # VERIFY: catch-all for unmapped ad_type — volume should shrink as mapping improves

  - name: platform
    completeness_check: true
    # VERIFY: source contains case-duplicate platforms (TikTok/TIKTOK,
    # Instagram/INSTAGRAM, YouTube/YOUTUBE, LinkedIn/LINKEDIN) — likely two
    # pipelines writing inconsistent casing. Left both casings in
    # expected_values below since both are real, current values, but this
    # should be normalized upstream. "unknown" and "null" values excluded
    # from expected_values on purpose (untagged rows, not a real platform) —
    # they won't be double-flagged as "new" since they recur every week and
    # fall into the lookback window after the first run.
    expected_values:
      - Instagram Stories
      - TikTok
      - NA
      - Threads
      - Spotter
      - Instagram
      - Snapchat
      - Twitter
      - Meta
      - Facebook
      - LinkedIn
      - Pinterest
      - YouTube
      - Instagram Reels
      - INSTAGRAM
      - YOUTUBE
      - TIKTOK
      - Web
      - LINKEDIN
      - Reddit

  - name: gtm_segment_budget
    completeness_check: true
    # Confirmed with the dashboard owner that this column intentionally
    # mixes product segments (Firefly, Photoshop, ...), budget/program
    # entries (Standard Sponsored Content, MAX Insiders, ...), and countries
    # (Japan, Germany, United Kingdom, France) in a single field — this is
    # expected behavior, not a data quality bug. "null" excluded from
    # expected_values (untagged rows).
    expected_values:
      - Lightroom Mobile
      - Lightroom
      - Standard Sponsored Content
      - Acrobat
      - Experience Cloud
      - Drawing
      - D2S
      - NA
      - MAX
      - Japan
      - Summit
      - Fresco
      - EDU
      - Substance 3D
      - AllApps
      - AcrobatDC
      - Design
      - Photoshop Mobile
      - CCE
      - DVA
      - CC
      - Germany
      - Photoshop Express
      - United Kingdom
      - Stock
      - DCE
      - Photoshop
      - Adobe Express
      - Firefly
      - France
      - Brand
      - MAX Insiders

  - name: cloud_budget
    completeness_check: true
    # "null" excluded from expected_values (untagged rows).
    expected_values:
      - Standard Sponsored Content
      - EC
      - NA
      - DC
      - Cross-Cloud
      - CC
      - Brand

  - name: content_framework_pillar
    completeness_check: true
    # "null" excluded from expected_values (untagged rows). "TBD" kept as a
    # real expected value since it recurs; # VERIFY whether it should
    # eventually be resolved to a real pillar rather than checked forever.
    expected_values:
      - Educate
      - AffinityGaming
      - Inform
      - Humorous
      - NA
      - Entertain
      - AffinityFashion
      - TBD
      - Inspire
      - ST

checks:
  freshness:
    enabled: true

  reconciliation:
    enabled: true

  parts_sum:
    enabled: true
    pivot_column: media_type   # media_type subtotals sum to the confirmed dashboard total (9,370,183,348 interactions, per Glossary/Deep-dive totals)

  trend_sanity:
    enabled: true
    max_wow_change_pct: 50.0
    # The Organic pillar alone showed a genuine +104% WoW swing in the
    # export (organic content can go viral), but that pillar is a minority
    # share of total interactions, so the whole-table trend_sanity check
    # (which sums across ALL rows, not per-pillar) stayed within 1-3% WoW
    # on the same weeks. 50.0 is kept at the "normal" default rather than
    # raised for the Organic-specific swing, since this check runs against
    # the full table total, not a per-pillar slice.

  completeness:
    enabled: true
