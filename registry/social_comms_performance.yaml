# Dashboard Registry — Social Comms Performance
# Generated by /onboard-dashboard skill on 2026-07-03
# REVIEW ALL FIELDS MARKED WITH # VERIFY before committing.

dashboard: social_comms_performance
description: >
  Weekly Adobe social media performance dashboard covering paid, organic,
  influencer, and earned content across all products and platforms.
  Owners: Sam Atayan, Yamini Pancheti. Data stewards: Raghuram Gopalakrishnan,
  Nagaraju Gajula.

dashboard_table: socialmedia.social_hub_consolidated_dashboard
source_table:    socialmedia.social_media_consolidated_silver
date_column:     fiscal_yr_and_wk_desc
date_format:     "YYYY-WW"

# row_filter: not configured. `data_type` (string) is confirmed present on
# both dashboard_table and source_table via DESCRIBE TABLE, so the engine's
# built-in `(data_type != 'Budget' OR data_type IS NULL)` filter in
# engine/quality_checks.py works as-is — no changes needed there.

# ── Metrics ─────────────────────────────────────────────────────────────────
# All column names below are confirmed via DESCRIBE TABLE against both
# dashboard_table and source_table.
metrics:

  - name: spend
    tolerance_pct: 0.5
    checks: [reconciliation, trend_sanity]

  - name: impressions
    tolerance_pct: 1.0
    checks: [reconciliation]

  - name: interactions
    tolerance_pct: 1.0
    checks: [reconciliation, trend_sanity]

  - name: engagements
    tolerance_pct: 1.5
    checks: [reconciliation]

  - name: video_views
    tolerance_pct: 2.0
    checks: [reconciliation]

  - name: link_clicks
    tolerance_pct: 1.5
    checks: [reconciliation]

  - name: clicks_all
    tolerance_pct: 1.5
    checks: [reconciliation]

  - name: comments
    tolerance_pct: 1.5
    checks: [reconciliation]

  - name: likes
    tolerance_pct: 1.5
    checks: [reconciliation]

  - name: shares
    tolerance_pct: 1.5
    checks: [reconciliation]

  - name: saves
    tolerance_pct: 1.5
    checks: [reconciliation]

# ── Dimensions ──────────────────────────────────────────────────────────────
# Every dimension below is completeness_check: false. Each one has a
# documented reason a static expected_values list would false-positive —
# see the VERIFY comment on each. Confirm with the data stewards named above
# before flipping any of these to true.
dimensions:

  - name: ad_type
    completeness_check: false
    expected_values: []
    # VERIFY: confirmed via
    #   SELECT DISTINCT ad_type FROM socialmedia.social_hub_consolidated_dashboard
    #   WHERE fiscal_yr_and_wk_desc = '2026-30';
    # to be the correct field behind the dashboard's "Media Type" filter —
    # values match the glossary's Dashboard Media Type list almost exactly:
    # Paid, Influencer (organic only), Paid - Boosted Owned, Organic, Earned,
    # Paid - Dark Whitelisted, Influencer (organic + boosting),
    # Paid - Boosted Whitelisted, Paid - Dark Owned, and NULL (untagged
    # rows). Bare "Paid" is the AD_TYPE_MAP fallback bucket per the glossary.
    # `channel` was ruled out — its values (Static, Video, Lightroom, UK,
    # "WV test", ...) don't represent Media Type at all; flag "WV test" to
    # the data stewards as likely leftover QA data in production regardless.
    # completeness_check stays false because of documented source migrations
    # near the onboarding date: CreatorIQ API replaced Golin XLS for
    # Influencer data from week 2026-24; Wavemakers became the sole paid
    # agency from week 2026-06; "Influencer (organic only)" has had zero
    # posts since week 2026-26 (the current week). A static list would
    # false-fail as these transitions land.

  - name: platform
    completeness_check: false
    expected_values: []
    # VERIFY: confirmed via
    #   SELECT DISTINCT platform FROM socialmedia.social_hub_consolidated_dashboard
    #   WHERE fiscal_yr_and_wk_desc = '2026-30';
    # to include case-duplicate values representing the same platform —
    # Instagram/INSTAGRAM, YouTube/YOUTUBE, TikTok/TIKTOK, LinkedIn/LINKEDIN
    # — plus literal "unknown" and NULL rows, and platforms not seen in any
    # screenshot (Threads, Spotter, Web, Reddit). This is a real upstream
    # data quality issue (inconsistent casing), not just an onboarding
    # unknown — a plain expected_values list would need to enumerate every
    # casing variant to pass, which would mask the underlying bug. Flag to
    # data stewards; do not enable completeness_check until casing is
    # normalized upstream or the check logic is casing-insensitive.

  - name: gtm_segment_budget
    completeness_check: false
    expected_values: []
    # VERIFY: confirmed via
    #   SELECT DISTINCT gtm_segment_budget FROM socialmedia.social_hub_consolidated_dashboard
    #   WHERE fiscal_yr_and_wk_desc = '2026-30';
    # to be a genuinely mixed-grain column: product lines (Lightroom,
    # Photoshop, Firefly, Acrobat, AcrobatDC, Brand, CC, DVA, Stock, Design,
    # Adobe Express, Substance 3D, Fresco, D2S, AllApps, CCE, Photoshop
    # Mobile/Express, Lightroom Mobile, MAX, MAX Insiders), countries (Japan,
    # Germany, United Kingdom, France), and other buckets (NA, Summit, EDU,
    # DCE, Experience Cloud, Drawing, Standard Sponsored Content). No stable
    # per-week subset is obvious from this alone — needs a grain-aware list
    # (e.g. per channel/ad_type) before enabling completeness_check.

  - name: cloud_budget
    completeness_check: false
    expected_values: []
    # VERIFY: value set differs across report pages (7 values on Overview:
    # CC, Brand, DC, Cross-Cloud, NA, Standard Sponsorship, EC; only 3-4
    # values shown on the Paid/Organic pillar pages). Confirm whether the
    # missing values are legitimately absent under certain filters before
    # enabling.

  - name: content_framework_pillar
    completeness_check: false
    expected_values: []
    # VERIFY: confirmed via
    #   SELECT DISTINCT content_framework_pillar
    #   FROM socialmedia.social_hub_consolidated_dashboard
    #   WHERE fiscal_yr_and_wk_desc = '2026-30';
    # to be: Educate, AffinityGaming, Inform, Humorous, NA, Entertain,
    # AffinityFashion, TBD, Inspire, ST, and NULL. The presence of "TBD" and
    # NULL suggests creative tagging is still in progress for some content —
    # not a stable set to check for completeness yet.

# ── Check Configuration ─────────────────────────────────────────────────────
checks:

  freshness:
    enabled: true

  reconciliation:
    enabled: true

  parts_sum:
    enabled: true
    pivot_column: gtm_segment_budget

  trend_sanity:
    enabled: true
    max_wow_change_pct: 50.0
    # The Organic pillar recorded a 104% WoW interactions swing (2026-25 ->
    # 2026-26) while total dashboard interactions moved only ~1% the same
    # week, so 50% is safe at the total (all-pillar) level this check
    # actually runs at. Known step-change events to watch for regardless:
    # the CreatorIQ cutover (week 2026-24) and Wavemakers becoming the sole
    # paid agency (week 2026-06) could still produce one-time total-level
    # jumps in spend/interactions the week they land.

  completeness:
    enabled: true
    # No dimension is completeness_check: true yet (see VERIFY notes above),
    # so this check will effectively no-op until at least one is confirmed.
