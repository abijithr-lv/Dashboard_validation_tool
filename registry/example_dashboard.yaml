# Dashboard Registry — Template
# -----------------------------------------------------------
# Copy this file to registry/<your_dashboard_name>.yaml and replace every
# placeholder value below with your own table names, metrics, and dimensions.
# This file is not tied to any real dashboard — nothing here is a live table.
#
# Easiest path: run /onboard-dashboard in Claude Code and let it generate a
# filled-in version of this from a screenshot. See README.md and
# QUICKSTART.md for the full manual walkthrough.
# -----------------------------------------------------------

dashboard: example_dashboard
description: >
  One-line description of what this dashboard shows and who uses it.

dashboard_table: <catalog>.<schema>.<dashboard_table>
source_table:    <catalog>.<schema>.<source_table>
date_column:     <date_column>            # e.g. fiscal_yr_and_wk_desc, report_date
date_format:     "<YYYY-WW or YYYY-MM-DD>"

# row_filter: "<optional: e.g. data_type != 'Budget'>"   # uncomment if needed

# lookback_weeks : how many trailing weeks of history feed the checks below.
#   - trend_sanity : compares the current week against the AVERAGE of the
#                    trailing lookback_weeks weeks instead of just last week,
#                    smoothing out one noisy week.
#   - completeness : a dimension value not in expected_values is only flagged
#                    as new/unexpected if it also hasn't appeared in ANY of
#                    the trailing lookback_weeks weeks (so a value that just
#                    rotates in and out isn't reported as "new" every time).
# Default 1 = old behavior (plain week-over-week, no new-value flagging window).
lookback_weeks: 4

# ── Metrics ─────────────────────────────────────────────────────────────────
# tolerance_pct : max acceptable gap between dashboard value and source value.
# checks        : which check types to run for this metric.
#   reconciliation — dashboard total ≈ source total
#   trend_sanity   — change vs. the lookback_weeks baseline within bounds
# ─────────────────────────────────────────────────────────────────────────────
metrics:

  - name: <metric_column>
    tolerance_pct: 1.0
    checks: [reconciliation, trend_sanity]

# ── Derived / aiding columns (optional, informational only) ──────────────────
# Ratios or glossary-defined formulas calculated FROM the metrics above
# (e.g. visit_rate = influenced_web_visits / impressions, or a glossary
# multiplier like "Acrobat TwP Conversions = TwP * 0.48"). These are not
# reconciled or trend-checked directly by the engine — they're documented
# here so the next person reading this registry knows they're derived, not
# raw source columns pulled straight from the table.
# ─────────────────────────────────────────────────────────────────────────────
# derived_metrics:
#   - name: <derived_column>
#     formula: "<e.g. influenced_web_visits / impressions>"
#     note: "calculated ratio — not reconciled directly"

# ── Dimensions ──────────────────────────────────────────────────────────────
# completeness_check : verify all required_values appear each week.
# required_values    : values that must be present EVERY week — a flagship
#                      product, a core platform. Missing values → DRIFT
#                      (1 missing) or FAIL (2+), alerted immediately.
#                      (expected_values is accepted as a legacy alias.)
# optional_values    : legitimate values that are allowed to be absent some
#                      weeks — event-driven segments (annual conference),
#                      seasonal campaigns. Absence is never flagged; presence
#                      is recognized as known (not "new/unexpected").
# Classify by asking "what does absence MEAN?": pipeline failure → required;
# normal business quiet period → optional. Confirm against real history
# (does it appear every period?) and the glossary/data steward, not just
# one screenshot.
# A value present this week that is in neither list nor seen in the trailing
# lookback_weeks weeks is reported as new/unexpected (DRIFT) — confirm it's
# a legitimate addition (new creative, new platform, ...) before adding it
# to one of the lists.
# ─────────────────────────────────────────────────────────────────────────────
dimensions:

  - name: <dimension_column>
    completeness_check: false   # set true once required_values is confirmed complete
    required_values: []
    optional_values: []

# ── Check Configuration ─────────────────────────────────────────────────────
checks:

  freshness:
    enabled: true

  reconciliation:
    enabled: true

  parts_sum:
    enabled: true
    # pivot_columns : one parts_sum check runs per column listed here, per
    # reconciled metric. Useful whenever the dashboard has more than one
    # meaningful way to slice totals (e.g. by segment AND by a Paid/Organic
    # pillar split) — a mislabeling bug that shifts rows from one value to
    # another within a column leaves the grand total untouched, so only a
    # breakdown check on THAT specific column will catch it.
    pivot_columns: [<dimension_column>]
    # pivot_column: <dimension_column>   # old single-column form, still supported

  trend_sanity:
    enabled: true
    max_wow_change_pct: 50.0

  completeness:
    enabled: true

  # sanity_range : flags any row where a logically-impossible condition is
  # true — e.g. a negative spend, or clicks exceeding interactions. Unlike
  # every other check, this needs no source_table comparison, so it catches
  # a bug that corrupts dashboard_table on its own — including the case
  # where the SAME bug corrupted source_table identically (reconciliation
  # would still PASS, since the two tables would still agree with each
  # other while both are wrong). Especially worth adding when the dashboard
  # shows any derived ratio (CTR, EIR, CPM, ...) — that's evidence some
  # calculation happens after the source table, which is exactly where this
  # kind of corruption gets introduced.
  # Each rule's expression describes the INVALID state — a single matching
  # row is a bug, not noise, so there's no tolerance/DRIFT tier: 0 violations
  # = PASS, any violation = FAIL.
  # sanity_range:
  #   enabled: true
  #   rules:
  #     - name: spend_non_negative
  #       expression: "spend < 0"
  #     - name: clicks_le_interactions
  #       expression: "<clicks_column> > <interactions_column>"
  #     - name: eir_within_100pct
  #       expression: "engagements > interactions"   # EIR = engagements/interactions can't exceed 100%
